<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub-Issue-Tracker | Home</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">

    <!-- Tailwind+DaisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>
    <header class="w-11/12 mx-auto">
        <div class="navbar flex justify-between items-center py-4 bg-base-100 shadow-sm">
            <div class="flex justify-center items-center gap-5">
                <img class="w-10 h-10" src="assets/github-logo.png" alt="">
                <h1 class="text-2xl font-semibold">GitHub Issue Tracker</h1>
            </div>
            <div class="search-box flex gap-2">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search issus...." class="input px-10 input-bordered w-24 md:w-auto" />
                <button class="btn bg-primary rounded-md text-white">Search</button>
            </div>
        </div>
    </header>
    <main class="max-w-[1110px] mx-auto mt-15">
        <section class="p-6 shadow-lg flex gap-3 font-medium rounded-md">
            <button class="btn w-[120px] bg-primary text-white px-3 py-2 text-center rounded-md">All</button>
            <button class="btn w-[120px] px-3 py-2 text-[#64748B] text-center rounded-md">Open</button>
            <button class="btn w-[120px] px-3 py-2 text-[#64748B] text-center rounded-md">Closed</button>
        </section>
        <section class="p-6 mt-4 shadow-lg rounded-lg">
            <div class="flex justify-between items-center ">
                <div class="flex gap-2 justify-start items-center">
                    <div class="bg-pink-100 p-1 rounded-full">
                        <img class="w-[50px] h-[50px]" src="assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <h4 class="text-xl font-semibold">50 Issues</h4>
                        <p class="text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-5">
                    <div class="flex gap-2 items-center">
                        <h4 class="w-3 h-3 bg-green-500 rounded-full"></h4>
                        <h4>Open</h4>
                    </div>
                    <div class="flex gap-2 items-center">
                        <h4 class="w-3 h-3 bg-violet-500 rounded-full"></h4>
                        <h4>Closed</h4>
                    </div>
                </div>
            </div>
            <hr class="my-6 text-gray-300">
            <div id="issues-container" class="cards grid grid-cols-4 gap-4">
            </div>
        </section>
    </main>

    <script src="JS/home.js"></script>
</body>

</html>
